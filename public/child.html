<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missing Child Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.card {
    width: 90%;
    max-width: 650px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 25px;
    color: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Image */
.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 20px;
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
}

/* Info grid */
.info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* Box */
.info-box {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 10px;
}

.label {
    font-size: 13px;
    opacity: 0.7;
}

.value {
    font-weight: 600;
}

/* Button */
.back-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.back-btn:hover {
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="card">
    <h2>Missing Child Details</h2>

    <img id="childPhoto" alt="Child Photo">

    <div class="info">
        <div class="info-box">
            <div class="label">Name</div>
            <div class="value" id="childName"></div>
        </div>

        <div class="info-box">
            <div class="label">Age</div>
            <div class="value" id="childAge"></div>
        </div>

        <div class="info-box">
            <div class="label">Gender</div>
            <div class="value" id="childGender"></div>
        </div>

        <div class="info-box">
            <div class="label">Height</div>
            <div class="value"><span id="childHeight"></span> cm</div>
        </div>

        <div class="info-box">
            <div class="label">Weight</div>
            <div class="value"><span id="childWeight"></span> kg</div>
        </div>

        <div class="info-box">
            <div class="label">Hair Color</div>
            <div class="value" id="childHairColor"></div>
        </div>

        <div class="info-box">
            <div class="label">Eye Color</div>
            <div class="value" id="childEyeColor"></div>
        </div>
    </div>

    <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);

const name = urlParams.get('name');
const age = urlParams.get('age');
const gender = urlParams.get('gender');
const height = urlParams.get('height');
const weight = urlParams.get('weight');
const hairColor = urlParams.get('hairColor');
const eyeColor = urlParams.get('eyeColor');
const photo = urlParams.get('photo');

// SET VALUES
document.getElementById('childName').textContent = name;
document.getElementById('childAge').textContent = age;
document.getElementById('childGender').textContent = gender;
document.getElementById('childHeight').textContent = height;
document.getElementById('childWeight').textContent = weight;
document.getElementById('childHairColor').textContent = hairColor;
document.getElementById('childEyeColor').textContent = eyeColor;

// IMPORTANT FIX FOR IMAGE
document.getElementById('childPhoto').src = "/images/" + encodeURIComponent(photo);

// BACK BUTTON
function goBack() {
    window.location.href = "/";
}
</script>

</body>
</html>
